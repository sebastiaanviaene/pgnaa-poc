<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PGNAA Analysis Software</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    background: #0D0F10; color: #E9EBE6;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .spectrum { height: 3px; background: linear-gradient(90deg,#1B4965,#2E8B8B 25%,#3FA34D 45%,#E0A82E 65%,#D0741A 82%,#E5484D); }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .card {
    width: 100%; max-width: 24rem; background: #17191A; border: 1px solid #272C2F;
    border-radius: 14px; padding: 2.2rem 2rem; text-align: center;
    box-shadow: 0 1px 2px rgba(0,0,0,.45), 0 14px 34px -18px rgba(0,0,0,.7);
  }
  .eyebrow {
    font-family: ui-monospace, Menlo, monospace; font-size: .68rem; letter-spacing: .16em;
    text-transform: uppercase; color: #898781; margin: 0 0 .8rem;
  }
  h1 { font-size: 1.3rem; margin: 0 0 .3rem; letter-spacing: -.01em; }
  h1 .m { font-family: ui-monospace, Menlo, monospace; color: #E0A82E; }
  p.sub { color: #898781; font-size: .84rem; margin: 0 0 1.5rem; }
  form { display: flex; flex-direction: column; gap: .6rem; }
  input {
    width: 100%; background: #1E2224; border: 1px solid #272C2F; border-radius: 9px;
    padding: .65rem .8rem; color: inherit; font: inherit; text-align: center;
    letter-spacing: .08em;
  }
  input:focus { outline: 2px solid #E0A82E; outline-offset: 1px; border-color: #E0A82E; }
  button {
    background: #E0A82E; color: #141210; border: none; border-radius: 9px;
    padding: .65rem; font: inherit; font-weight: 700; cursor: pointer;
  }
  button:disabled { opacity: .55; cursor: wait; }
  .err { color: #E5484D; font-size: .8rem; min-height: 1.2em; margin: .6rem 0 0; }
  .card.shake { animation: shake .35s; }
  @keyframes shake { 20%,60% { transform: translateX(-7px); } 40%,80% { transform: translateX(7px); } }
  @media (prefers-reduced-motion: reduce) { .card.shake { animation: none; } }
  footer { text-align: center; color: #52514E; font-family: ui-monospace, Menlo, monospace; font-size: .64rem; letter-spacing: .08em; padding: 1rem; }
</style>
</head>
<body>
<div class="spectrum"></div>
<main>
  <div class="card" id="card">
    <p class="eyebrow">Protected demo</p>
    <h1><span class="m">PGNAA</span> Analysis Software</h1>
    <p class="sub">This proof of concept is access-protected. Enter the password to decrypt it in your browser.</p>
    <form id="f">
      <input type="password" id="pwd" placeholder="Password" autocomplete="current-password" autofocus>
      <button type="submit" id="go">Unlock</button>
    </form>
    <p class="err" id="err"></p>
  </div>
</main>

const dec = b => Uint8Array.from(atob(b), c => c.charCodeAt(0));
async function unlock(pwd) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pwd), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: dec(P.salt), iterations: 600000, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: dec(P.iv) }, key, dec(P.ct));
  const html = new TextDecoder().decode(pt);
  try { sessionStorage.setItem("pgnaa_pwd", pwd); } catch (e) {}
  document.open(); document.write(html); document.close();
}
const f = document.getElementById("f"), err = document.getElementById("err"),
      go = document.getElementById("go"), card = document.getElementById("card");
f.addEventListener("submit", async ev => {
  ev.preventDefault();
  err.textContent = ""; go.disabled = true; go.textContent = "Decrypting…";
  try { await unlock(document.getElementById("pwd").value); }
  catch (e) {
    go.disabled = false; go.textContent = "Unlock";
    err.textContent = "Wrong password — decryption failed.";
    card.classList.remove("shake"); void card.offsetWidth; card.classList.add("shake");
  }
});
// auto-unlock within the same browser session
try {
  const saved = sessionStorage.getItem("pgnaa_pwd");
  if (saved) unlock(saved).catch(() => sessionStorage.removeItem("pgnaa_pwd"));
} catch (e) {}
